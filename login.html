<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | AFB Trade & Services Inc.</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Styles -->
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .auth-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - var(--header-height));
            background: linear-gradient(135deg, var(--color-bg-light) 0%, #e2e8f0 100%);
            padding: 4rem 1rem;
            margin-top: var(--header-height);
        }
        
        .auth-card {
            background: var(--color-white);
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            border-top: 4px solid var(--color-accent);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header i {
            font-size: 3rem;
            color: var(--color-primary);
            margin-bottom: 1rem;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            color: var(--color-primary);
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--color-text-light);
            font-size: 0.95rem;
            margin: 0;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--color-text-light);
            border-top: 1px solid var(--color-border);
            padding-top: 1.5rem;
        }

        .auth-footer a {
            color: var(--color-accent);
            font-weight: 600;
        }

        .auth-footer a:hover {
            color: var(--color-primary);
        }

        /* Password Toggle */
        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--color-text-light);
        }
        
        .password-toggle:hover {
            color: var(--color-primary);
        }
    </style>
</head>
<body>


    <!-- ══════════════════════════════════════
       AFB HEADER
       ══════════════════════════════════════ -->
    <header>
      <div class="afb-header">
        <!-- LOGO -->
        <a href="index.html" class="afb-logo">
          <div class="afb-logo-icon">
            <svg width="42" height="42" viewBox="0 0 42 42" xmlns="http://www.w3.org/2000/svg">
              <defs><clipPath id="globeClip"><circle cx="19" cy="20" r="16"/></clipPath></defs>
              <circle cx="19" cy="20" r="16" fill="#1A2E4A"/>
              <g clip-path="url(#globeClip)" fill="none" stroke="#C9962A" stroke-width="0.7" opacity="0.7">
                <line x1="3" y1="20" x2="35" y2="20"/><ellipse cx="19" cy="20" rx="16" ry="5.5"/><ellipse cx="19" cy="20" rx="16" ry="11"/>
              </g>
              <g clip-path="url(#globeClip)" fill="none" stroke="#C9962A" stroke-width="0.7" opacity="0.7">
                <line x1="19" y1="4" x2="19" y2="36"/><ellipse cx="19" cy="20" rx="7" ry="16"/><ellipse cx="19" cy="20" rx="13" ry="16"/>
              </g>
              <circle cx="19" cy="20" r="16" fill="none" stroke="#C9962A" stroke-width="1.4"/>
              <circle cx="30" cy="31" r="8" fill="#15243B"/>
              <circle cx="30" cy="31" r="8" fill="none" stroke="#C9962A" stroke-width="1.2"/>
              <g transform="translate(30,31) scale(0.155)">
                <path d="M 0,-42 L 14,-18 L 34,-26 L 26,-6 L 52,-4 L 38,14 L 44,38 L 18,30 L 14,62 L -14,62 L -18,30 L -44,38 L -38,14 L -52,-4 L -26,-6 L -34,-26 L -14,-18 Z" fill="#C41230"/>
              </g>
            </svg>
          </div>
          <div class="afb-logo-text">
            <span class="afb-logo-monogram">AFB</span>
            <span class="afb-logo-tagname">Trade &amp; Services</span>
          </div>
        </a>

        <!-- DESKTOP NAV -->
        <nav class="afb-nav">
          <a href="index.html" >Home</a>
          <a href="about.html" >About Us</a>
          <a href="immigration.html" >Immigration</a>
          <a href="trading.html" >Trading &amp; Export</a>
          <a href="real-estate.html" >Real Estate</a>
          <a href="contact.html" >Contact</a>
        </nav>

        <!-- LOGIN BUTTON -->
        <a href="login.html" class="afb-btn-login" style="text-decoration: none;">Login</a>

        <!-- HAMBURGER (mobile) -->
        <button class="afb-hamburger" aria-label="Toggle menu" onclick="toggleMobileNav()">
          <span></span><span></span><span></span>
        </button>
      </div>
      <div class="afb-header-rule"></div>
      <!-- MOBILE NAV DRAWER -->
      <nav class="afb-mobile-nav" id="mobileNav">
        <a href="index.html" >Home</a>
        <a href="about.html" >About Us</a>
        <a href="immigration.html" >Immigration</a>
        <a href="trading.html" >Trading &amp; Export</a>
        <a href="real-estate.html" >Real Estate</a>
        <a href="contact.html" >Contact</a>
        <a href="login.html" class="afb-mobile-login">Login</a>
      </nav>
    </header>

    <!-- Authentication Section -->
    <section class="auth-section">
        <div class="auth-card animate-on-scroll">
            <div class="auth-header">
                <i class="fa-solid fa-user-lock"></i>
                <h1>Welcome Back</h1>
                <p>Sign in to your client portal.</p>
            </div>
            
            <div id="loginFeedback" class="form-feedback" style="display: none;"></div>

            <form id="loginForm" action="#" method="post" novalidate>
                <div class="form-group">
                    <label for="loginEmail" style="font-weight: 500; font-size: 0.95rem; color: var(--color-primary); display: block; margin-bottom: 0.5rem;">Email Address</label>
                    <input type="email" id="loginEmail" name="email" class="form-control" placeholder="name@example.com">
                    <div id="loginEmailError" class="error-message"></div>
                </div>
                
                <div class="form-group" style="margin-top: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <label for="loginPassword" style="font-weight: 500; font-size: 0.95rem; color: var(--color-primary);">Password</label>
                        <a href="#" style="font-size: 0.85rem; color: var(--color-text-light);">Forgot Password?</a>
                    </div>
                    <div class="password-container">
                        <input type="password" id="loginPassword" name="password" class="form-control" placeholder="••••••••">
                        <i class="fa-solid fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                    <div id="loginPasswordError" class="error-message"></div>
                </div>
                
                <div class="form-group" style="margin-top: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" id="rememberMe" style="cursor: pointer;">
                    <label for="rememberMe" style="font-size: 0.9rem; cursor: pointer;">Remember me for 30 days</label>
                </div>
                
                <button type="submit" id="btnLoginSubmit" class="btn btn-primary" style="width: 100%; margin-top: 2rem;">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Create Account</a>
            </div>
        </div>
    </section>

    <!-- Minimal Script for Auth -->
    <script src="assets/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://jblpdggxkcrfraoktumw.supabase.co';
        const supabaseKey = 'sb_publishable_xl2vu1yL4J7A5bQCX6vA0A_2GSapFku';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        document.addEventListener('DOMContentLoaded', () => {
            // Password Visibility Toggle
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('loginPassword');
            
            if(togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function () {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.classList.toggle('fa-eye');
                    this.classList.toggle('fa-eye-slash');
                });
            }

            // Basic Form Validation for Auth
            const loginForm = document.getElementById('loginForm');
            if(loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    let isValid = true;
                    
                    const emailInput = document.getElementById('loginEmail');
                    const emailError = document.getElementById('loginEmailError');
                    const passInput = document.getElementById('loginPassword');
                    const passError = document.getElementById('loginPasswordError');
                    const btnSubmit = document.getElementById('btnLoginSubmit');
                    const feedback = document.getElementById('loginFeedback');

                    emailInput.classList.remove('is-invalid');
                    emailError.style.display = 'none';
                    passInput.classList.remove('is-invalid');
                    passError.style.display = 'none';
                    feedback.style.display = 'none';

                    // Email Validation
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if (!emailRegex.test(emailInput.value.trim())) {
                        emailInput.classList.add('is-invalid');
                        emailError.textContent = 'Please enter a valid email address.';
                        emailError.style.display = 'block';
                        isValid = false;
                    }

                    // Password Validation
                    if (passInput.value.length < 6) {
                        passInput.classList.add('is-invalid');
                        passError.textContent = 'Password must be at least 6 characters long.';
                        passError.style.display = 'block';
                        isValid = false;
                    }

                    if (!isValid) return;

                    btnSubmit.innerHTML = 'Authenticating... <span class="loading-spinner" style="display:inline-block;"></span>';
                    btnSubmit.disabled = true;

                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: emailInput.value.trim(),
                        password: passInput.value
                    });

                    if (error) {
                        feedback.className = 'form-feedback error';
                        feedback.style.display = 'block';
                        feedback.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> ' + error.message;
                        btnSubmit.innerHTML = 'Sign In';
                        btnSubmit.disabled = false;
                    } else {
                        feedback.className = 'form-feedback success';
                        feedback.style.display = 'block';
                        feedback.innerHTML = '<i class="fa-solid fa-circle-check"></i> Login successful! Redirecting ...';
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    }
                });
            }
        });
    </script>
</body>
</html>
